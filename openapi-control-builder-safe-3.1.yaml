    get:
      operationId: getHelpdeskKbManifest
      description: Get current KB manifest.
      parameters:
        - name: ref
          in: query
          required: false
          schema:
            type: string
            default: published
      responses:
        '200':
          description: GitHub content response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  path:
                    type: string
                  sha:
                    type: string
                  size:
                    type: integer
                  encoding:
                    type: string
                  content:
                    type: string
                  download_url:
                    type: string
