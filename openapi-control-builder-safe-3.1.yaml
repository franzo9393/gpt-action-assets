  /repos/franzo9393/Geppetto-help-desk-segreteria-kb/issues:
    post:
      operationId: createKbUpdateRequestIssue
      description: Create a pending KB update request issue.
      x-openai-isConsequential: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - body
              properties:
                title:
                  type: string
                  maxLength: 120
                body:
                  type: string
                  maxLength: 8000
                labels:
                  type: array
                  items:
                    type: string
                  default:
                    - kb-update-request
                    - pending-review
      responses:
        '201':
          description: Created issue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  number:
                    type: integer
                  html_url:
                    type: string
                  title:
                    type: string
                  state:
                    type: string
